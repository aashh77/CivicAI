<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Civic Platform - Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/shared/css/base.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h2>📝 Create Account</h2>
    <p style="color:#6b7385;font-size:13.5px;margin-top:-8px;">Join your community as a citizen reporter</p>
    <div class="field"><label>Full Name</label><input class="input" id="name" /></div>
    <div class="field"><label>Email</label><input class="input" id="email" type="email" /></div>
    <div class="field"><label>Password</label><input class="input" id="password" type="password" /></div>
    <button class="btn" style="width:100%;justify-content:center;" onclick="doRegister()">Sign Up</button>
    <div class="switch">Already have an account? <a href="/user/login.html">Log in</a></div>
  </div>
</div>
<script src="/shared/js/api.js"></script>
<script>
async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!name || !email || !password) return alert('All fields are required');
  try {
    const data = await Api.post('/api/auth/register', { name, email, password });
    Api.setToken(data.token);
    Api.setUser(data.user);
    window.location.href = '/user/index.html';
  } catch (err) {
    alert(err.message);
  }
}
</script>
</body>
</html>
